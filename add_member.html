<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4fe830",
                        "background-light": "#f6f8f6",
                        "background-dark": "#142111",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans KR", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>교인 추가 - 교회 관리 시스템</title>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 lg:px-40">
                <div class="flex items-center gap-3">
                    <div class="bg-primary/20 p-2 rounded-lg text-primary">
                        <span class="material-symbols-outlined">person_add</span>
                    </div>
                    <h2 class="text-xl font-bold tracking-tight">교인 추가</h2>
                </div>
                <a href="index.html"
                    class="flex items-center justify-center rounded-full h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </a>
            </header>
            <main class="flex flex-1 justify-center py-8 px-4 lg:px-40">
                <div class="layout-content-container flex flex-col max-w-[800px] flex-1 gap-6">
                    <div class="bg-white dark:bg-slate-900/50 p-1.5 rounded-xl border border-primary/10 shadow-sm flex">
                        <label class="flex-1 cursor-pointer">
                            <input checked="" class="peer hidden" name="type" type="radio" value="family" />
                            <div
                                class="text-center py-2.5 rounded-lg text-sm font-semibold transition-all peer-checked:bg-primary peer-checked:text-white text-slate-500">
                                가구/가족 추가</div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input class="peer hidden" name="type" type="radio" value="individual" />
                            <div
                                class="text-center py-2.5 rounded-lg text-sm font-semibold transition-all peer-checked:bg-primary peer-checked:text-white text-slate-500">
                                개인 추가</div>
                        </label>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div
                            class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-primary/5 shadow-sm space-y-4">
                            <h3 class="text-lg font-bold flex items-center gap-2 mb-4">
                                <span class="material-symbols-outlined text-primary">badge</span> 기본 정보
                            </h3>
                            <div class="space-y-1.5">
                                <p class="text-sm font-semibold text-slate-700 dark:text-slate-300">이름</p>
                                <input id="memberName"
                                    class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3"
                                    placeholder="이름을 입력하세요" type="text" />
                            </div>
                            <div class="space-y-1.5">
                                <p class="text-sm font-semibold text-slate-700 dark:text-slate-300">역할</p>
                                <select id="memberRole"
                                    class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3">
                                    <option value="">선택하세요</option>
                                    <option value="순장">순장</option>
                                    <option value="순원">순원</option>
                                    <option value="방장">방장</option>
                                    <option value="권찰">권찰</option>
                                    <option value="leader">소그룹 리더</option>
                                    <option value="member">일반 단원</option>
                                    <option value="new">새가족</option>
                                </select>
                            </div>
                            <div class="space-y-1.5">
                                <p class="text-sm font-semibold text-slate-700 dark:text-slate-300">연락처</p>
                                <input id="memberPhone"
                                    class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3"
                                    placeholder="010-0000-0000" type="tel" />
                            </div>
                            <div class="space-y-1.5">
                                <p class="text-sm font-semibold text-slate-700 dark:text-slate-300">생년월일</p>
                                <div class="relative">
                                    <input id="memberBirthdate"
                                        class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3"
                                        type="date" />
                                </div>
                            </div>
                        </div>
                        <div
                            class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-primary/5 shadow-sm space-y-4">
                            <h3 class="text-lg font-bold flex items-center gap-2 mb-4">
                                <span class="material-symbols-outlined text-primary">favorite</span> 배우자 정보
                            </h3>
                            <div class="space-y-1.5">
                                <p class="text-sm font-semibold text-slate-700 dark:text-slate-300">배우자 이름</p>
                                <input id="memberSpouse"
                                    class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3"
                                    placeholder="배우자 성명" type="text" />
                            </div>
                            <div class="space-y-1.5">
                                <p class="text-sm font-semibold text-slate-700 dark:text-slate-300">결혼기념일</p>
                                <input id="memberAnniversary"
                                    class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3"
                                    type="date" />
                            </div>
                            <div class="p-4 bg-primary/5 rounded-xl border border-primary/10 mt-4">
                                <div class="flex items-center gap-3">
                                    <span class="material-symbols-outlined text-primary">info</span>
                                    <p class="text-xs text-slate-600 dark:text-slate-400">배우자를 먼저 등록한 경우 검색을 통해 연결할 수
                                        있습니다.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-primary/5 shadow-sm space-y-4">
                        <h3 class="text-lg font-bold flex items-center gap-2 mb-4">
                            <span class="material-symbols-outlined text-primary">notes</span> 기도제목 및 비고
                        </h3>
                        <div class="space-y-1.5">
                            <p class="text-sm font-semibold text-slate-700 dark:text-slate-300">기도제목</p>
                            <textarea id="memberPrayerRequest"
                                class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3 resize-none"
                                placeholder="첫 방문 기도제목이나 특별한 요청사항을 입력하세요" rows="3"></textarea>
                        </div>
                        <div class="space-y-1.5 pt-2">
                            <p class="text-sm font-semibold text-slate-700 dark:text-slate-300">기타 메모</p>
                            <textarea id="memberNotes"
                                class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3 resize-none"
                                placeholder="방문 경로, 특이사항 등" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3 pt-4">
                        <button id="saveMemberBtn" type="button"
                            class="flex-1 bg-primary hover:bg-opacity-90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20">
                            저장하기
                        </button>
                        <a href="index.html"
                            class="flex-1 text-center bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold py-4 rounded-xl transition-all">
                            취소
                        </a>
                    </div>
                </div>
            </main>
            <footer class="py-10 text-center text-slate-400 text-sm">
                <p>© 2024 Church Management System. All rights reserved.</p>
            </footer>
        </div>
    </div>

    <script type="module" src="/src/add_member.js"></script>
</body>

</html>
