<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>로그인 - 온소망145순</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#4fe830" },
                    fontFamily: { "display": ["Noto Sans KR", "sans-serif"] }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 0.5s ease forwards;
        }

        .glow {
            box-shadow: 0 0 32px rgba(79, 232, 48, 0.25);
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-[#0f1f0d] via-[#142111] to-[#0a1508] flex items-center justify-center p-4">

    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-sm fade-up relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-20 h-20 bg-primary/10 rounded-2xl mb-4 glow border border-primary/20">
                <svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 21.7C5.5 16.6 2 11.8 2 8a7 7 0 0114 0c0 3.8-3.5 8.6-4 13.7zm0 0c.5-5.1 4-9.9 4-13.7a7 7 0 00-14 0" />
                </svg>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight">온소망145순</h1>
            <p class="text-slate-400 mt-2 text-sm">함께하는 순모임 관리 플랫폼</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-white mb-2 text-center">로그인</h2>
            <p class="text-slate-400 text-sm text-center mb-8">구글 계정으로 간편하게 시작하세요</p>

            <!-- Google Login Button -->
            <button id="googleLoginBtn" type="button"
                class="w-full flex items-center justify-center gap-3 bg-white text-slate-800 font-bold py-3.5 px-6 rounded-xl hover:bg-slate-50 active:scale-95 transition-all shadow-lg">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Google로 로그인
            </button>

            <!-- Loading state -->
            <div id="loadingState" class="hidden text-center py-4">
                <div class="inline-flex items-center gap-2 text-slate-400 text-sm">
                    <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"></path>
                    </svg>
                    로그인 중...
                </div>
            </div>

            <p class="text-xs text-slate-500 text-center mt-6">
                로그인하면 <span class="text-primary">기도제목·멤버 관리</span>를 이용할 수 있어요
            </p>
        </div>

        <p class="text-center text-slate-600 text-xs mt-6">© 2024 온소망145순. All rights reserved.</p>
    </div>

    <script type="module" src="/src/login.js"></script>
</body>

</html>
